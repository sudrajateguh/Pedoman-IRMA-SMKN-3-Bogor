<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pedoman Kepengurusan IRMA – SMKN 3 Bogor</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #f9f9f7;
  --surface: #ffffff;
  --border: #e8e5df;
  --text: #1a1915;
  --muted: #6b6860;
  --accent-1: #2d6a4f;   /* hijau tua – BAB I */
  --accent-2: #1d4e89;   /* biru – BAB II */
  --accent-3: #7b3f00;   /* coklat tua – BAB III */
  --accent-4: #5c2d91;   /* ungu – BAB IV */
  --accent-5: #b5451b;   /* oranye – BAB V */
  --accent-6: #1a5276;   /* biru teal – BAB VI */
  --accent-7: #145a32;   /* hijau gelap – BAB VII */
  --sidebar-w: 260px;
  --content-max: 820px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.75;
}

/* ── SIDEBAR ─────────────────────────────────────────────────── */
.sidebar {
  position: fixed;
  top: 0; left: 0;
  width: var(--sidebar-w);
  height: 100vh;
  background: #fff;
  border-right: 1px solid var(--border);
  overflow-y: auto;
  z-index: 100;
  display: flex;
  flex-direction: column;
}

.sidebar-brand {
  padding: 24px 20px 16px;
  border-bottom: 1px solid var(--border);
}

.sidebar-brand .logo-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--accent-1), #52b788);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  margin-bottom: 10px;
}

.sidebar-brand h1 {
  font-family: 'Lora', serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.4;
}

.sidebar-brand p {
  font-size: 11px;
  color: var(--muted);
  margin-top: 2px;
}

.sidebar-nav {
  flex: 1;
  padding: 12px 0;
}

.nav-section {
  padding: 4px 14px 2px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 12px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 16px;
  font-size: 12.5px;
  color: var(--muted);
  text-decoration: none;
  border-radius: 6px;
  margin: 1px 8px;
  transition: all .15s;
  cursor: pointer;
}

.nav-item:hover { background: #f3f2ef; color: var(--text); }
.nav-item.active { background: #eaf4ee; color: var(--accent-1); font-weight: 600; }

.nav-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ── MAIN ────────────────────────────────────────────────────── */
.main {
  margin-left: var(--sidebar-w);
  min-height: 100vh;
}

/* ── COVER ───────────────────────────────────────────────────── */
.cover {
  background: linear-gradient(160deg, #0d3b26 0%, #1a5c3e 40%, #1d4e89 100%);
  padding: 80px 60px 60px;
  color: white;
  position: relative;
  overflow: hidden;
}

.cover-bg-img {
  position: absolute;
  inset: 0;
  background-image: url('https://images.unsplash.com/photo-1564769662533-4f00a87b4056?w=1400&q=80');
  background-size: cover;
  background-position: center 40%;
  opacity: 0.13;
  mix-blend-mode: luminosity;
  z-index: 0;
  pointer-events: none;
}

.cover::before {
  content: '';
  position: absolute;
  top: -80px; right: -80px;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(255,255,255,.06) 0%, transparent 70%);
  border-radius: 50%;
}

.cover::after {
  content: '';
  position: absolute;
  bottom: -40px; left: 200px;
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(255,255,255,.04) 0%, transparent 70%);
  border-radius: 50%;
}

.cover-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,.15);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,.2);
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 11.5px;
  font-weight: 600;
  letter-spacing: .05em;
  margin-bottom: 28px;
  color: rgba(255,255,255,.9);
}

.cover h1 {
  font-family: 'Lora', serif;
  font-size: clamp(30px, 4vw, 44px);
  font-weight: 700;
  line-height: 1.2;
  margin-bottom: 12px;
  max-width: 600px;
}

.cover-inner {
  position: relative;
  z-index: 1;
}

.cover h1 em {
  font-style: italic;
  color: #a8e6c4;
}

.cover-sub {
  font-size: 16px;
  color: rgba(255,255,255,.7);
  margin-bottom: 36px;
}

.cover-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.chip {
  background: rgba(255,255,255,.12);
  border: 1px solid rgba(255,255,255,.2);
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 12px;
  color: rgba(255,255,255,.85);
}

.cover-scroll {
  position: absolute;
  bottom: 24px; right: 40px;
  font-size: 11px;
  color: rgba(255,255,255,.4);
  display: flex;
  align-items: center;
  gap: 6px;
}

/* ── CONTENT ─────────────────────────────────────────────────── */
.content {
  max-width: var(--content-max);
  margin: 0 auto;
  padding: 0 40px 80px;
}

/* ── SECTION / BAB HEADER ────────────────────────────────────── */
.bab {
  margin-top: 64px;
  scroll-margin-top: 24px;
}

.bab-header {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  gap: 14px;
  margin-bottom: 36px;
  padding: 40px 32px 36px;
  border-radius: 20px;
  position: relative;
  overflow: hidden;
  color: white;
  box-shadow: 0 8px 32px rgba(0,0,0,.15);
  margin-left: -8px;
  margin-right: -8px;
}

/* Orb dekoratif kiri-kanan */
.bab-header::before {
  content: '';
  position: absolute;
  top: -60px; right: -60px;
  width: 220px; height: 220px;
  background: radial-gradient(circle, rgba(255,255,255,.09) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}

.bab-header::after {
  content: '';
  position: absolute;
  bottom: -40px; left: -20px;
  width: 160px; height: 160px;
  background: radial-gradient(circle, rgba(255,255,255,.06) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}

/* Per-BAB gradient backgrounds */
#bab1 .bab-header { background: linear-gradient(135deg, #0a2e1c 0%, #1a5c3e 55%, #2d7a52 100%); }
#bab2 .bab-header { background: linear-gradient(135deg, #071a36 0%, #1d4e89 55%, #2563b0 100%); }
#bab3 .bab-header { background: linear-gradient(135deg, #3a1800 0%, #7b3f00 55%, #9e5400 100%); }
#bab4 .bab-header { background: linear-gradient(135deg, #1e0b3d 0%, #5c2d91 55%, #7640b8 100%); }
#bab5 .bab-header { background: linear-gradient(135deg, #4a1500 0%, #b5451b 55%, #d45e2e 100%); }
#bab6 .bab-header { background: linear-gradient(135deg, #051520 0%, #1a5276 55%, #1f6fa0 100%); }
#bab7 .bab-header { background: linear-gradient(135deg, #031a0c 0%, #145a32 55%, #1c7a44 100%); }

.bab-icon {
  width: 68px; height: 68px;
  border-radius: 18px;
  display: flex; align-items: center; justify-content: center;
  font-size: 32px;
  flex-shrink: 0;
  background: rgba(255,255,255,.18) !important;
  box-shadow: 0 4px 20px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.3);
  backdrop-filter: blur(8px);
}

.bab-meta {
  flex: 1;
  width: 100%;
}

.bab-label {
  font-size: 11px;
  font-weight: 800;
  letter-spacing: .2em;
  text-transform: uppercase;
  margin-bottom: 8px;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  color: rgba(255,255,255,.7);
  background: rgba(255,255,255,.12);
  border: 1px solid rgba(255,255,255,.2);
  border-radius: 20px;
  padding: 4px 14px;
}

.bab h2 {
  font-family: 'Lora', serif;
  font-size: 26px;
  font-weight: 700;
  line-height: 1.3;
  color: white;
  max-width: 560px;
  margin: 0 auto;
  text-shadow: 0 1px 8px rgba(0,0,0,.2);
}

/* Per-BAB colors */
.c1 { color: var(--accent-1); }
.c2 { color: var(--accent-2); }
.c3 { color: var(--accent-3); }
.c4 { color: var(--accent-4); }
.c5 { color: var(--accent-5); }
.c6 { color: var(--accent-6); }
.c7 { color: var(--accent-7); }

.bg1 { background: #eaf4ee; }
.bg2 { background: #e8f0fc; }
.bg3 { background: #f9ede0; }
.bg4 { background: #f2ebff; }
.bg5 { background: #fdeee8; }
.bg6 { background: #e2f0f7; }
.bg7 { background: #e8f5ec; }

/* ── H3 SUB-HEADING ──────────────────────────────────────────── */
.sub-section {
  margin-top: 32px;
  margin-bottom: 12px;
}

.sub-section h3 {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 16px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 8px;
}

.sub-section h3::before {
  content: '';
  display: inline-block;
  width: 4px; height: 18px;
  border-radius: 2px;
  background: currentColor;
  opacity: .6;
  flex-shrink: 0;
}

/* ── H4 ──────────────────────────────────────────────────────── */
h4.label {
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  margin: 20px 0 8px;
  color: var(--muted);
}

/* ── PROSE ───────────────────────────────────────────────────── */
.prose {
  font-size: 14.5px;
  color: #2e2c28;
  line-height: 1.8;
  margin-bottom: 12px;
}

/* ── LISTS ───────────────────────────────────────────────────── */
.list {
  list-style: none;
  margin: 8px 0 16px;
}

.list li {
  display: flex;
  align-items: baseline;
  gap: 10px;
  padding: 4px 0;
  font-size: 14.5px;
  line-height: 1.7;
}

.list li::before {
  content: '›';
  font-size: 16px;
  font-weight: 700;
  flex-shrink: 0;
  margin-top: 1px;
  color: var(--muted);
}

.list.numbered { counter-reset: li; }
.list.numbered li::before {
  counter-increment: li;
  content: counter(li) '.';
  font-size: 13px;
  font-weight: 700;
  min-width: 20px;
  color: inherit;
}

.list.sub { margin-left: 24px; }
.list.sub li::before { content: '–'; font-weight: 400; }

/* ── CALLOUT BOX ─────────────────────────────────────────────── */
.callout {
  display: flex;
  gap: 14px;
  padding: 14px 18px;
  border-radius: 10px;
  margin: 16px 0;
  border: 1px solid transparent;
  font-size: 14px;
  line-height: 1.7;
}

.callout-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }
.callout-body { flex: 1; }
.callout-body strong { display: block; font-size: 13px; font-weight: 700; margin-bottom: 4px; }

.callout.info { background: #edf4fd; border-color: #c5dcf8; }
.callout.tip  { background: #eaf4ee; border-color: #b2d8c2; }
.callout.warn { background: #fef9e7; border-color: #f5d76e; }
.callout.principle { background: #f3f2ef; border-color: #d9d7d0; }

/* ── FLOW / ALUR ─────────────────────────────────────────────── */
.flow {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  margin: 16px 0 20px;
  padding: 20px 24px;
  background: #f7f6f3;
  border-radius: 12px;
  border: 1px solid var(--border);
}

.flow-step {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: auto;
}

.flow-step-box {
  display: flex;
  align-items: center;
  gap: 10px;
  flex: 0 0 auto;
}

.flow-num {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  font-weight: 700;
  color: white;
  flex-shrink: 0;
}

.flow-text {
  font-size: 13px;
  font-weight: 600;
  line-height: 1.4;
  background: #fff;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  padding: 5px 14px;
  white-space: nowrap;
  color: var(--text);
}

.flow-arrow {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  padding: 2px 0;
  color: #bbb;
  font-size: 18px;
  user-select: none;
}

/* Horizontal flow */
.flow-h {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 0;
  margin: 16px 0 20px;
}

.flow-h .fh-step {
  display: flex;
  align-items: center;
  gap: 0;
}

.fh-box {
  background: white;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 14px;
  font-size: 13px;
  font-weight: 500;
  text-align: center;
  white-space: nowrap;
}

.fh-arrow { color: #bbb; padding: 0 6px; font-size: 18px; }

/* ── COMPARISON TABLE ────────────────────────────────────────── */
.compare-table {
  width: 100%;
  border-collapse: collapse;
  margin: 16px 0 20px;
  font-size: 13.5px;
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid var(--border);
}

.compare-table th {
  padding: 12px 16px;
  font-weight: 700;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: .05em;
  text-align: left;
  color: white;
}

.compare-table td {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
  line-height: 1.6;
}

.compare-table tr:last-child td { border-bottom: none; }
.compare-table tr:nth-child(odd) td { background: #fafaf8; }

/* ── INFO CARDS GRID ─────────────────────────────────────────── */
.cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin: 16px 0;
}

.card {
  background: white;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
}

.card-title {
  font-size: 12px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: .06em;
  margin-bottom: 8px;
  color: #1a1915;
  text-align: center;
}

.card ul { list-style: none; }
.card ul li { font-size: 13px; line-height: 1.7; padding: 2px 0; }
.card ul li::before { content: '• '; }

/* ── SEKBID CARD ─────────────────────────────────────────────── */
.sekbid-wrap { margin-top: 24px; }

.sekbid-card {
  background: white;
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 20px;
  overflow: hidden;
}

.sekbid-head {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 20px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
}

.sekbid-emoji { font-size: 30px; line-height: 1; }

.sekbid-head-text h4 {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0;
  text-transform: none;
  color: var(--text);
  margin: 0;
}

.sekbid-head-text p {
  font-size: 12px;
  color: var(--muted);
}

.sekbid-body {
  padding: 16px 20px;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
}

@media(max-width: 700px) {
  .sekbid-body { grid-template-columns: 1fr; }
  .cards { grid-template-columns: 1fr; }
}

.sekbid-col h5 {
  font-size: 11px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: .07em;
  color: #1e1c18;
  margin-bottom: 8px;
  opacity: 0.85;
}

.sekbid-col ul { list-style: none; }
.sekbid-col ul li { font-size: 12.5px; line-height: 1.7; padding: 2px 0; }
.sekbid-col ul li::before { content: '› '; color: var(--muted); font-weight: 700; }

/* ── PRINCIPLE BLOCK ─────────────────────────────────────────── */
.principle-block {
  background: linear-gradient(135deg, #f7f6f3 0%, #f0efec 100%);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px 24px;
  margin: 16px 0;
}

.principle-block .p-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
}

.principle-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.p-item {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  font-size: 13.5px;
  line-height: 1.6;
}

.p-num {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--text);
  color: white;
  font-size: 11px;
  font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  margin-top: 2px;
}

/* ── TIMELINE TAHAPAN ────────────────────────────────────────── */
.timeline {
  margin: 16px 0;
  position: relative;
  padding-left: 32px;
}

.timeline::before {
  content: '';
  position: absolute;
  left: 11px;
  top: 8px;
  bottom: 8px;
  width: 2px;
  background: var(--border);
}

.tl-item {
  position: relative;
  margin-bottom: 24px;
}

.tl-dot {
  position: absolute;
  left: -32px;
  top: 3px;
  width: 24px; height: 24px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  font-weight: 700;
  color: white;
}

.tl-title {
  font-size: 14.5px;
  font-weight: 700;
  margin-bottom: 6px;
}

.tl-body { font-size: 13.5px; color: #3a3834; line-height: 1.7; }
.tl-body ul { list-style: none; margin-top: 6px; }
.tl-body ul li { padding: 2px 0; display: flex; gap: 8px; }
.tl-body ul li::before { content: '—'; color: #bbb; flex-shrink: 0; }

/* ── DOC TABLE ───────────────────────────────────────────────── */
.doc-table {
  width: 100%;
  border-collapse: collapse;
  margin: 12px 0;
  font-size: 13px;
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}

.doc-table th {
  padding: 10px 14px;
  font-weight: 700;
  font-size: 11.5px;
  text-transform: uppercase;
  letter-spacing: .05em;
  text-align: left;
  background: #f0efec;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
}

.doc-table td {
  padding: 9px 14px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
  line-height: 1.6;
}

.doc-table tr:last-child td { border-bottom: none; }
.doc-table tr:nth-child(even) td { background: #fafaf8; }

/* ── DIVIDER ─────────────────────────────────────────────────── */
.divider {
  height: 1px;
  background: var(--border);
  margin: 32px 0;
}

/* ── PENUTUP ─────────────────────────────────────────────────── */
.closing {
  background: linear-gradient(135deg, #0d3b26 0%, #1a5c3e 100%);
  color: white;
  padding: 48px 40px;
  margin: 48px 0 0;
}

.closing h2 { font-family: 'Lora', serif; font-size: 26px; margin-bottom: 16px; }
.closing p { font-size: 14px; color: rgba(255,255,255,.8); line-height: 1.8; margin-bottom: 16px; }
.closing ul { list-style: none; margin: 12px 0 24px; }
.closing ul li { padding: 4px 0; font-size: 14px; color: rgba(255,255,255,.85); display: flex; gap: 10px; }
.closing ul li::before { content: '✦'; color: #a8e6c4; flex-shrink: 0; }

.sig-box {
  margin-top: 32px;
  display: flex;
  justify-content: flex-end;
}

.sig-inner {
  background: rgba(255,255,255,.1);
  border: 1px solid rgba(255,255,255,.2);
  border-radius: 10px;
  padding: 20px 32px;
  text-align: center;
  min-width: 220px;
}

.sig-inner p { font-size: 13px; color: rgba(255,255,255,.7); margin-bottom: 48px; }
.sig-inner .sig-line { border-top: 1px solid rgba(255,255,255,.4); padding-top: 10px; font-size: 13px; font-weight: 600; }

/* ── SCROLL PROGRESS ─────────────────────────────────────────── */
#progress-bar {
  position: fixed;
  top: 0; left: var(--sidebar-w);
  height: 3px;
  background: linear-gradient(90deg, var(--accent-1), #52b788);
  z-index: 200;
  transition: width .1s;
  width: 0%;
}

/* ── BACK TO TOP ─────────────────────────────────────────────── */
#back-top {
  position: fixed;
  bottom: 28px; right: 28px;
  width: 40px; height: 40px;
  background: var(--text);
  color: white;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  cursor: pointer;
  opacity: 0;
  transition: opacity .2s;
  z-index: 100;
  border: none;
}

#back-top.visible { opacity: 1; }

/* ── RESPONSIVE ──────────────────────────────────────────────── */
@media (max-width: 900px) {
  :root { --sidebar-w: 0px; }
  .sidebar { display: none; }
  .main { margin-left: 0; }
  .content { padding: 0 20px 60px; }
  .cover { padding: 48px 24px 40px; }
  #progress-bar { left: 0; }
}

/* ── ANIMATIONS ──────────────────────────────────────────────── */

/* Cover entrance */
@keyframes coverTag {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes coverTitle {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes coverSub {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes coverChips {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.cover-tag   { animation: coverTag   .8s cubic-bezier(.16,1,.3,1) .1s  both; }
.cover h1    { animation: coverTitle .9s cubic-bezier(.16,1,.3,1) .28s both; }
.cover-sub   { animation: coverSub   .8s cubic-bezier(.16,1,.3,1) .52s both; }
