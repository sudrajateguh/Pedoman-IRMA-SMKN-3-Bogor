<style>
:root {
  --bg: #f9f9f7;
  --surface: #ffffff;
  --border: #e8e5df;
  --text: #1a1915;
  --muted: #6b6860;
  --accent-1: #2d6a4f;   /* hijau tua – BAB I */
  --accent-2: #1d4e89;   /* biru – BAB II */
  --accent-3: #7b3f00;   /* coklat tua – BAB III */
  --accent-4: #5c2d91;   /* ungu – BAB IV */
  --accent-5: #b5451b;   /* oranye – BAB V */
  --accent-6: #1a5276;   /* biru teal – BAB VI */
  --accent-7: #145a32;   /* hijau gelap – BAB VII */
  --sidebar-w: 260px;
  --content-max: 820px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.75;
}

/* ── SIDEBAR ─────────────────────────────────────────────────── */
.sidebar {
  position: fixed;
  top: 0; left: 0;
  width: var(--sidebar-w);
  height: 100vh;
  background: #fff;
  border-right: 1px solid var(--border);
  overflow-y: auto;
  z-index: 100;
  display: flex;
  flex-direction: column;
}

.sidebar-brand {
  padding: 24px 20px 16px;
  border-bottom: 1px solid var(--border);
}

.sidebar-brand .logo-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--accent-1), #52b788);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  margin-bottom: 10px;
}

.sidebar-brand h1 {
  font-family: 'Lora', serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.4;
}

.sidebar-brand p {
  font-size: 11px;
  color: var(--muted);
  margin-top: 2px;
}

.sidebar-nav {
  flex: 1;
  padding: 12px 0;
}

.nav-section {
  padding: 4px 14px 2px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 12px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 16px;
  font-size: 12.5px;
  color: var(--muted);
  text-decoration: none;
  border-radius: 6px;
  margin: 1px 8px;
  transition: all .15s;
  cursor: pointer;
}

.nav-item:hover { background: #f3f2ef; color: var(--text); }
.nav-item.active { background: #eaf4ee; color: var(--accent-1); font-weight: 600; }

.nav-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ── MAIN ────────────────────────────────────────────────────── */
.main {
  margin-left: var(--sidebar-w);
  min-height: 100vh;
}

/* ── COVER ───────────────────────────────────────────────────── */
.cover {
  background: linear-gradient(160deg, #0d3b26 0%, #1a5c3e 40%, #1d4e89 100%);
  padding: 80px 60px 60px;
  color: white;
  position: relative;
  overflow: hidden;
}

.cover-bg-img {
  position: absolute;
  inset: 0;
  background-image: url('https://images.unsplash.com/photo-1555993539-1732b0258235?w=1600&q=85');
  background-size: cover;
  background-position: center 55%;
  opacity: 0.12;
  mix-blend-mode: luminosity;
  z-index: 0;
  pointer-events: none;
}

.cover::before {
  content: '';
  position: absolute;
  top: -80px; right: -80px;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(255,255,255,.06) 0%, transparent 70%);
  border-radius: 50%;
}

.cover::after {
  content: '';
  position: absolute;
  bottom: -40px; left: 200px;
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(255,255,255,.04) 0%, transparent 70%);
  border-radius: 50%;
}

.cover-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,.15);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,.2);
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 11.5px;
  font-weight: 600;
  letter-spacing: .05em;
  margin-bottom: 28px;
  color: rgba(255,255,255,.9);
}

.cover h1 {
  font-family: 'Lora', serif;
  font-size: clamp(30px, 4vw, 44px);
  font-weight: 700;
  line-height: 1.2;
  margin-bottom: 12px;
  max-width: 600px;
}

.cover-inner {
  position: relative;
  z-index: 1;
}

/* Cover logo — centered above badge */
.cover-logo {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 20px;
}
.cover-logo-circle {
  width: 76px; height: 76px;
  border-radius: 50%;
  background: rgba(255,255,255,.15);
  backdrop-filter: blur(8px);
  border: 1.5px solid rgba(255,255,255,.25);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 20px rgba(0,0,0,.25);
}
.cover-logo-caption {
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: rgba(255,255,255,.6);
  margin-top: 9px;
}

.cover h1 em {
  font-style: italic;
  color: #a8e6c4;
}

.cover-sub {
  font-size: 16px;
  color: rgba(255,255,255,.7);
  margin-bottom: 36px;
}

.cover-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.chip {
  background: rgba(255,255,255,.12);
  border: 1px solid rgba(255,255,255,.2);
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 12px;
  color: rgba(255,255,255,.85);
}

.cover-scroll {
  position: absolute;
  bottom: 24px; right: 40px;
  font-size: 11px;
  color: rgba(255,255,255,.4);
  display: flex;
  align-items: center;
  gap: 6px;
}

/* ── CONTENT ─────────────────────────────────────────────────── */
.content {
  max-width: var(--content-max);
  margin: 0 auto;
  padding: 0 40px 80px;
}

/* ── SECTION / BAB HEADER ────────────────────────────────────── */
.bab {
  margin-top: 64px;
  scroll-margin-top: 24px;
}

.bab-header {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  gap: 14px;
  margin-bottom: 36px;
  padding: 40px 32px 36px;
  border-radius: 20px;
  position: relative;
  overflow: hidden;
  color: white;
  box-shadow: 0 8px 32px rgba(0,0,0,.15);
  margin-left: -8px;
  margin-right: -8px;
}

/* Orb dekoratif kiri-kanan */
.bab-header::before {
  content: '';
  position: absolute;
  top: -60px; right: -60px;
  width: 220px; height: 220px;
  background: radial-gradient(circle, rgba(255,255,255,.09) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}

.bab-header::after {
  content: '';
  position: absolute;
  bottom: -40px; left: -20px;
  width: 160px; height: 160px;
  background: radial-gradient(circle, rgba(255,255,255,.06) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}

/* Per-BAB gradient backgrounds */
#bab1 .bab-header { background: linear-gradient(135deg, #0a2e1c 0%, #1a5c3e 55%, #2d7a52 100%); }
#bab2 .bab-header { background: linear-gradient(135deg, #071a36 0%, #1d4e89 55%, #2563b0 100%); }
#bab3 .bab-header { background: linear-gradient(135deg, #3a1800 0%, #7b3f00 55%, #9e5400 100%); }
#bab4 .bab-header { background: linear-gradient(135deg, #1e0b3d 0%, #5c2d91 55%, #7640b8 100%); }
#bab5 .bab-header { background: linear-gradient(135deg, #4a1500 0%, #b5451b 55%, #d45e2e 100%); }
#bab6 .bab-header { background: linear-gradient(135deg, #051520 0%, #1a5276 55%, #1f6fa0 100%); }
#bab7 .bab-header { background: linear-gradient(135deg, #031a0c 0%, #145a32 55%, #1c7a44 100%); }

.bab-icon {
  width: 68px; height: 68px;
  border-radius: 18px;
  display: flex; align-items: center; justify-content: center;
  font-size: 32px;
  flex-shrink: 0;
  background: rgba(255,255,255,.18) !important;
  box-shadow: 0 4px 20px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.3);
  backdrop-filter: blur(8px);
}

.bab-meta {
  flex: 1;
  width: 100%;
}

.bab-label {
  font-size: 11px;
  font-weight: 800;
  letter-spacing: .2em;
  text-transform: uppercase;
  margin-bottom: 8px;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  color: rgba(255,255,255,.7);
  background: rgba(255,255,255,.12);
  border: 1px solid rgba(255,255,255,.2);
  border-radius: 20px;
  padding: 4px 14px;
}

.bab h2 {
  font-family: 'Lora', serif;
  font-size: 26px;
  font-weight: 700;
  line-height: 1.3;
  color: white;
  max-width: 560px;
  margin: 0 auto;
  text-shadow: 0 1px 8px rgba(0,0,0,.2);
}

/* Per-BAB colors */
.c1 { color: var(--accent-1); }
.c2 { color: var(--accent-2); }
.c3 { color: var(--accent-3); }
.c4 { color: var(--accent-4); }
.c5 { color: var(--accent-5); }
.c6 { color: var(--accent-6); }
.c7 { color: var(--accent-7); }

.bg1 { background: #eaf4ee; }
.bg2 { background: #e8f0fc; }
.bg3 { background: #f9ede0; }
.bg4 { background: #f2ebff; }
.bg5 { background: #fdeee8; }
.bg6 { background: #e2f0f7; }
.bg7 { background: #e8f5ec; }

/* ── H3 SUB-HEADING ──────────────────────────────────────────── */
.sub-section {
  margin-top: 32px;
  margin-bottom: 12px;
}

.sub-section h3 {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 16px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 8px;
}

.sub-section h3::before {
  content: '';
  display: inline-block;
  width: 4px; height: 18px;
  border-radius: 2px;
  background: currentColor;
  opacity: .6;
  flex-shrink: 0;
}

/* ── H4 ──────────────────────────────────────────────────────── */
h4.label {
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  margin: 20px 0 8px;
  color: var(--muted);
}

/* ── PROSE ───────────────────────────────────────────────────── */
.prose {
  font-size: 14.5px;
  color: #2e2c28;
  line-height: 1.8;
  margin-bottom: 12px;
}

/* ── LISTS ───────────────────────────────────────────────────── */
.list {
  list-style: none;
  margin: 8px 0 16px;
}

.list li {
  display: flex;
  align-items: baseline;
  gap: 10px;
  padding: 4px 0;
  font-size: 14.5px;
  line-height: 1.7;
}

.list li::before {
  content: '›';
  font-size: 16px;
  font-weight: 700;
  flex-shrink: 0;
  margin-top: 1px;
  color: var(--muted);
}

.list.numbered { counter-reset: li; }
.list.numbered li::before {
  counter-increment: li;
  content: counter(li) '.';
  font-size: 13px;
  font-weight: 700;
  min-width: 20px;
  color: inherit;
}

.list.sub { margin-left: 24px; }
.list.sub li::before { content: '–'; font-weight: 400; }

/* ── CALLOUT BOX ─────────────────────────────────────────────── */
.callout {
  display: flex;
  gap: 14px;
  padding: 14px 18px;
  border-radius: 10px;
  margin: 16px 0;
  border: 1px solid transparent;
  font-size: 14px;
  line-height: 1.7;
}

.callout-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }
.callout-body { flex: 1; }
.callout-body strong { display: block; font-size: 13px; font-weight: 700; margin-bottom: 4px; }

.callout.info { background: #edf4fd; border-color: #c5dcf8; }
.callout.tip  { background: #eaf4ee; border-color: #b2d8c2; }
.callout.warn { background: #fef9e7; border-color: #f5d76e; }
.callout.principle { background: #f3f2ef; border-color: #d9d7d0; }

/* ── HAL YANG DIKOORDINASIKAN – yellow attention card ────────── */
.card-attention {
  background: #fffbea;
  border: 1.5px solid #f5c842;
  border-left: 4px solid #e6b800;
  border-radius: 10px;
  padding: 14px 18px;
  width: 100%;
  box-sizing: border-box;
}

/* ── FLOW / ALUR ─────────────────────────────────────────────── */
.flow {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  margin: 16px 0 20px;
  padding: 20px 24px;
  background: #f7f6f3;
  border-radius: 12px;
  border: 1px solid var(--border);
}

.flow-step {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: auto;
}

.flow-step-box {
  display: flex;
  align-items: center;
  gap: 10px;
  flex: 0 0 auto;
}

.flow-num {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  font-weight: 700;
  color: white;
  flex-shrink: 0;
}

.flow-text {
  font-size: 13px;
  font-weight: 600;
  line-height: 1.4;
  background: #fff;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  padding: 5px 14px;
  white-space: nowrap;
  color: var(--text);
}

.flow-arrow {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  padding: 2px 0;
  color: #bbb;
  font-size: 18px;
  user-select: none;
}

/* Horizontal flow */
.flow-h {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 0;
  margin: 16px 0 20px;
}

.flow-h .fh-step {
  display: flex;
  align-items: center;
  gap: 0;
}

.fh-box {
  background: white;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 14px;
  font-size: 13px;
  font-weight: 500;
  text-align: center;
  white-space: nowrap;
}

.fh-arrow { color: #bbb; padding: 0 6px; font-size: 18px; }

/* ── COMPARISON TABLE ────────────────────────────────────────── */
.compare-table {
  width: 100%;
  border-collapse: collapse;
  margin: 16px 0 20px;
  font-size: 13.5px;
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid var(--border);
}

.compare-table th {
  padding: 12px 16px;
  font-weight: 700;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: .05em;
  text-align: left;
  color: white;
}

.compare-table td {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
  line-height: 1.6;
}

.compare-table tr:last-child td { border-bottom: none; }
.compare-table tr:nth-child(odd) td { background: #fafaf8; }

/* ── INFO CARDS GRID ─────────────────────────────────────────── */
.cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin: 16px 0;
}

.card {
  background: white;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
}

.card-title {
  font-size: 12px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: .06em;
  margin-bottom: 8px;
  color: #1a1915;
  text-align: center;
}

.card ul { list-style: none; }
.card ul li { font-size: 13px; line-height: 1.7; padding: 2px 0; }
.card ul li::before { content: '• '; }

/* ── SEKBID CARD ─────────────────────────────────────────────── */
.sekbid-wrap { margin-top: 24px; }

.sekbid-card {
  background: white;
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 20px;
  overflow: hidden;
}

.sekbid-head {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 20px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
}

.sekbid-emoji { font-size: 30px; line-height: 1; }

.sekbid-head-text h4 {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0;
  text-transform: none;
  color: var(--text);
  margin: 0;
}

.sekbid-head-text p {
  font-size: 12px;
  color: var(--muted);
}

.sekbid-body {
  padding: 16px 20px;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
}

@media(max-width: 700px) {
  .sekbid-body { grid-template-columns: 1fr; }
  .cards { grid-template-columns: 1fr; }
}

.sekbid-col h5 {
  font-size: 11px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: .07em;
  color: #1e1c18;
  margin-bottom: 8px;
  opacity: 0.85;
}

.sekbid-col ul { list-style: none; }
.sekbid-col ul li { font-size: 12.5px; line-height: 1.7; padding: 2px 0; }
.sekbid-col ul li::before { content: '› '; color: var(--muted); font-weight: 700; }

/* ── PRINCIPLE BLOCK ─────────────────────────────────────────── */
.principle-block {
  background: linear-gradient(135deg, #f7f6f3 0%, #f0efec 100%);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px 24px;
  margin: 16px 0;
}

.principle-block .p-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
}

.principle-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.p-item {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  font-size: 13.5px;
  line-height: 1.6;
}

.p-num {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--text);
  color: white;
  font-size: 11px;
  font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  margin-top: 2px;
}

/* ── TIMELINE TAHAPAN ────────────────────────────────────────── */
.timeline {
  margin: 16px 0;
  position: relative;
  padding-left: 32px;
}

.timeline::before {
  content: '';
  position: absolute;
  left: 11px;
  top: 8px;
  bottom: 8px;
  width: 2px;
  background: var(--border);
}

.tl-item {
  position: relative;
  margin-bottom: 24px;
}

.tl-dot {
  position: absolute;
  left: -32px;
  top: 3px;
  width: 24px; height: 24px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  font-weight: 700;
  color: white;
}

.tl-title {
  font-size: 14.5px;
  font-weight: 700;
  margin-bottom: 6px;
}

.tl-body { font-size: 13.5px; color: #3a3834; line-height: 1.7; }
.tl-body ul { list-style: none; margin-top: 6px; }
.tl-body ul li { padding: 2px 0; display: flex; gap: 8px; }
.tl-body ul li::before { content: '—'; color: #bbb; flex-shrink: 0; }

/* ── DOC TABLE ───────────────────────────────────────────────── */
.doc-table {
  width: 100%;
  border-collapse: collapse;
  margin: 12px 0;
  font-size: 13px;
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}

.doc-table th {
  padding: 10px 14px;
  font-weight: 700;
  font-size: 11.5px;
  text-transform: uppercase;
  letter-spacing: .05em;
  text-align: left;
  background: #f0efec;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
}

.doc-table td {
  padding: 9px 14px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
  line-height: 1.6;
}

.doc-table tr:last-child td { border-bottom: none; }
.doc-table tr:nth-child(even) td { background: #fafaf8; }

/* ── DIVIDER ─────────────────────────────────────────────────── */
.divider {
  height: 1px;
  background: var(--border);
  margin: 32px 0;
}

/* ── PENUTUP ─────────────────────────────────────────────────── */
.closing {
  background: linear-gradient(135deg, #0d3b26 0%, #1a5c3e 100%);
  color: white;
  padding: 48px 40px;
  margin: 48px 0 0;
}

.closing h2 { font-family: 'Lora', serif; font-size: 26px; margin-bottom: 16px; }
.closing p { font-size: 14px; color: rgba(255,255,255,.8); line-height: 1.8; margin-bottom: 16px; }
.closing ul { list-style: none; margin: 12px 0 24px; }
.closing ul li { padding: 4px 0; font-size: 14px; color: rgba(255,255,255,.85); display: flex; gap: 10px; }
.closing ul li::before { content: '✦'; color: #a8e6c4; flex-shrink: 0; }

.sig-box {
  margin-top: 32px;
  display: flex;
  justify-content: flex-end;
}

.sig-inner {
  background: rgba(255,255,255,.1);
  border: 1px solid rgba(255,255,255,.2);
  border-radius: 10px;
  padding: 20px 32px;
  text-align: center;
  min-width: 220px;
}

.sig-inner p { font-size: 13px; color: rgba(255,255,255,.7); margin-bottom: 48px; }
.sig-inner .sig-line { border-top: 1px solid rgba(255,255,255,.4); padding-top: 10px; font-size: 13px; font-weight: 600; }

/* ── SCROLL PROGRESS ─────────────────────────────────────────── */
#progress-bar {
  position: fixed;
  top: 0; left: var(--sidebar-w);
  height: 3px;
  background: linear-gradient(90deg, var(--accent-1), #52b788);
  z-index: 200;
  transition: width .1s;
  width: 0%;
}

/* ── BACK TO TOP ─────────────────────────────────────────────── */
#back-top {
  position: fixed;
  bottom: 28px; right: 28px;
  width: 40px; height: 40px;
  background: var(--text);
  color: white;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  cursor: pointer;
  opacity: 0;
  transition: opacity .2s;
  z-index: 100;
  border: none;
}

#back-top.visible { opacity: 1; }

/* ── RESPONSIVE ──────────────────────────────────────────────── */
@media (max-width: 900px) {
  :root { --sidebar-w: 0px; }
  .sidebar { display: none; }
  .main { margin-left: 0; }
  .content { padding: 0 20px 60px; }
  .cover {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 72px 24px 48px;
  }
  .cover-inner {
    text-align: center;
    width: 100%;
  }
  #progress-bar { left: 0; }
}

/* ── TEXT SELECTION HIGHLIGHT ────────────────────────────────── */
::selection {
  background: rgba(82, 183, 136, 0.32);
  color: inherit;
}
::-moz-selection {
  background: rgba(82, 183, 136, 0.32);
  color: inherit;
}

/* ── CUSTOM CURSOR (desktop only) ────────────────────────────── */
@media (min-width: 901px) {
  #app-content *, #lock-screen * { cursor: none !important; }

  #cursor-ring {
    position: fixed;
    top: 0; left: 0;
    width: 38px; height: 38px;
    border: 1.5px solid rgba(45, 106, 79, 0.65);
    border-radius: 50%;
    pointer-events: none;
    z-index: 99999;
    transform: translate(-50%, -50%);
    will-change: transform;
    mix-blend-mode: multiply;
    box-shadow: none;
    transition:
      width       0.18s cubic-bezier(0.22, 1, 0.36, 1),
      height      0.18s cubic-bezier(0.22, 1, 0.36, 1),
      border-color 0.18s ease,
      background  0.18s ease,
      box-shadow  0.22s ease;
  }

  #cursor-dot {
    position: fixed;
    top: 0; left: 0;
    width: 5px; height: 5px;
    background: rgba(45, 106, 79, 0.9);
    border-radius: 50%;
    pointer-events: none;
    z-index: 99999;
    transform: translate(-50%, -50%);
    will-change: transform;
    transition:
      width  0.18s cubic-bezier(0.22, 1, 0.36, 1),
      height 0.18s cubic-bezier(0.22, 1, 0.36, 1),
      background 0.18s ease,
      box-shadow 0.22s ease;
  }

  /* ── HOVER: ring lebih besar + glow hijau, dot ikut membesar ── */
  #cursor-ring.hovering {
    width: 60px; height: 60px;
    border-color: rgba(82, 183, 136, 0.75);
    background: rgba(82, 183, 136, 0.07);
    box-shadow:
      0 0 0   4px rgba(82, 183, 136, 0.10),
      0 0 14px 6px rgba(82, 183, 136, 0.18),
      0 0 28px 10px rgba(82, 183, 136, 0.08);
  }

  /* Dot ikut membesar saat hover */
  #cursor-dot.hovering {
    width: 8px; height: 8px;
    background: rgba(45, 106, 79, 1);
    box-shadow: 0 0 6px 3px rgba(82, 183, 136, 0.45);
  }

  /* ── CLICK: ring menyusut tajam ─────────────────────────────── */
  #cursor-ring.clicking {
    width: 22px; height: 22px;
    border-color: rgba(45, 106, 79, 1);
    background: rgba(45, 106, 79, 0.12);
    box-shadow:
      0 0 0  2px rgba(45, 106, 79, 0.15),
      0 0 8px 4px rgba(45, 106, 79, 0.20);
    transition-duration: 0.07s;
  }

  /* ── ON COVER: warna hijau muda ─────────────────────────────── */
  /* ── ON DARK SECTIONS (cover & penutup): warna putih ───────── */
  #cursor-ring.on-dark {
    border-color: rgba(255, 255, 255, 0.80);
    width: 46px; height: 46px;
    background: rgba(255, 255, 255, 0.05);
    box-shadow:
      0 0 10px 4px rgba(255, 255, 255, 0.12),
      0 0 22px 8px rgba(255, 255, 255, 0.06);
    transition:
      width       0.18s cubic-bezier(0.22, 1, 0.36, 1),
      height      0.18s cubic-bezier(0.22, 1, 0.36, 1),
      border-color 0.22s ease,
      background  0.22s ease,
      box-shadow  0.25s ease;
  }

  #cursor-dot.on-dark {
    background: rgba(255, 255, 255, 0.95);
    box-shadow: 0 0 5px 2px rgba(255, 255, 255, 0.35);
  }

  /* ON DARK + HOVERING: glow putih lebih terang */
  #cursor-ring.on-dark.hovering {
    width: 62px; height: 62px;
    border-color: rgba(255, 255, 255, 0.95);
    background: rgba(255, 255, 255, 0.08);
    box-shadow:
      0 0 0   4px rgba(255, 255, 255, 0.10),
      0 0 16px 7px rgba(255, 255, 255, 0.20),
      0 0 32px 14px rgba(255, 255, 255, 0.08);
  }

  #cursor-dot.on-dark.hovering {
    width: 8px; height: 8px;
    background: rgba(255, 255, 255, 1);
    box-shadow: 0 0 8px 4px rgba(255, 255, 255, 0.50);
  }
}

/* ── ANIMATIONS ──────────────────────────────────────────────── */

/* Cover entrance */
@keyframes coverTag {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes coverTitle {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes coverSub {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes coverChips {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.cover-logo  { animation: none; }
.cover-tag   { animation: none; }
.cover h1    { animation: none; }
.cover-sub   { animation: none; }
.cover-chips { animation: none; }

/* Cover animations only fire after unlock */
#app-content.visible .cover-logo  { animation: coverTag   1.2s cubic-bezier(0.22, 1, 0.36, 1) 0s    both; }
#app-content.visible .cover-tag   { animation: coverTag   1.3s cubic-bezier(0.22, 1, 0.36, 1) 0.3s  both; }
#app-content.visible .cover h1    { animation: coverTitle 1.4s cubic-bezier(0.22, 1, 0.36, 1) 0.65s both; }
#app-content.visible .cover-sub   { animation: coverSub   1.3s cubic-bezier(0.22, 1, 0.36, 1) 1.05s both; }
#app-content.visible .cover-chips { animation: coverChips 1.3s cubic-bezier(0.22, 1, 0.36, 1) 1.35s both; }

/* Scroll-reveal base — soft, generous, breathable */
.reveal {
  opacity: 0;
  transform: translateY(44px);
  will-change: opacity, transform;
  transition:
    opacity  1.1s cubic-bezier(0.22, 1, 0.36, 1),
    transform 1.1s cubic-bezier(0.22, 1, 0.36, 1);
}
.reveal.revealed {
  opacity: 1;
  transform: translateY(0);
}

/* Staggered grid children */
.reveal-group > * {
  opacity: 0;
  transform: translateY(36px);
  will-change: opacity, transform;
  transition:
    opacity  1s cubic-bezier(0.22, 1, 0.36, 1),
    transform 1s cubic-bezier(0.22, 1, 0.36, 1);
}
.reveal-group.revealed > *:nth-child(1) { opacity:1; transform:translateY(0); transition-delay:.08s; }
.reveal-group.revealed > *:nth-child(2) { opacity:1; transform:translateY(0); transition-delay:.20s; }
.reveal-group.revealed > *:nth-child(3) { opacity:1; transform:translateY(0); transition-delay:.32s; }
.reveal-group.revealed > *:nth-child(4) { opacity:1; transform:translateY(0); transition-delay:.44s; }
.reveal-group.revealed > *:nth-child(5) { opacity:1; transform:translateY(0); transition-delay:.56s; }
.reveal-group.revealed > *:nth-child(6) { opacity:1; transform:translateY(0); transition-delay:.68s; }
.reveal-group.revealed > *:nth-child(7) { opacity:1; transform:translateY(0); transition-delay:.80s; }

.bab { animation: none; }

/* ══════════════════════════════════════════════════════════════
   INNER BOX ANIMATIONS — slow, cinematic, organic
══════════════════════════════════════════════════════════════ */

/* Easing presets (used via animation shorthand below)
   --ease-out-expo : cubic-bezier(0.16, 1, 0.3, 1)   — fast start, long glide
   --ease-spring   : cubic-bezier(0.34, 1.56, 0.64, 1) — slight overshoot
   --ease-silk     : cubic-bezier(0.22, 1, 0.36, 1)   — ultra-smooth landing
*/

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(22px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeUpFar {
  from { opacity: 0; transform: translateY(38px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
@keyframes slideRight {
  from { opacity: 0; transform: translateX(-18px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes scalePop {
  0%   { opacity: 0; transform: scale(0.72); }
  70%  { opacity: 1; transform: scale(1.06); }
  100% { opacity: 1; transform: scale(1); }
}
@keyframes scaleIn {
  from { opacity: 0; transform: scale(0.88); }
  to   { opacity: 1; transform: scale(1); }
}
@keyframes lineGrow {
  from { transform: scaleX(0); opacity: 0; }
  to   { transform: scaleX(1); opacity: 0.6; }
}
@keyframes numberPop {
  0%   { opacity: 0; transform: scale(0.4) rotate(-20deg); }
  65%  { opacity: 1; transform: scale(1.1) rotate(4deg); }
  100% { opacity: 1; transform: scale(1) rotate(0deg); }
}

/* ─ BAB header — cinematic entrance ──────────────────────── */
.bab-header.revealed .bab-icon {
  animation: scalePop 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) 0.15s both;
}
.bab-header.revealed .bab-label {
  animation: fadeUp 0.85s cubic-bezier(0.22, 1, 0.36, 1) 0.32s both;
}
.bab-header.revealed h2 {
  animation: fadeUpFar 1s cubic-bezier(0.22, 1, 0.36, 1) 0.5s both;
}

/* ─ Card — layered reveal ────────────────────────────────── */
.card.revealed > [style*="font-size:28px"],
.card.revealed > [style*="font-size:24px"],
.card.revealed > [style*="font-size:32px"] {
  animation: scalePop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.12s both;
}
.card.revealed .card-title {
  animation: fadeUp 0.75s cubic-bezier(0.22, 1, 0.36, 1) 0.26s both;
}
.card.revealed ul li:nth-child(1)  { animation: slideRight 0.65s cubic-bezier(0.22, 1, 0.36, 1) 0.36s both; }
.card.revealed ul li:nth-child(2)  { animation: slideRight 0.65s cubic-bezier(0.22, 1, 0.36, 1) 0.46s both; }
.card.revealed ul li:nth-child(3)  { animation: slideRight 0.65s cubic-bezier(0.22, 1, 0.36, 1) 0.56s both; }
.card.revealed ul li:nth-child(4)  { animation: slideRight 0.65s cubic-bezier(0.22, 1, 0.36, 1) 0.66s both; }
.card.revealed ul li:nth-child(5)  { animation: slideRight 0.65s cubic-bezier(0.22, 1, 0.36, 1) 0.76s both; }
.card.revealed ul li:nth-child(6)  { animation: slideRight 0.65s cubic-bezier(0.22, 1, 0.36, 1) 0.86s both; }
.card.revealed ul li:nth-child(7)  { animation: slideRight 0.65s cubic-bezier(0.22, 1, 0.36, 1) 0.96s both; }
.card.revealed ul li:nth-child(8)  { animation: slideRight 0.65s cubic-bezier(0.22, 1, 0.36, 1) 1.06s both; }

/* ─ Callout ──────────────────────────────────────────────── */
.callout.revealed .callout-icon {
  animation: scalePop 0.75s cubic-bezier(0.34, 1.56, 0.64, 1) 0.08s both;
}
.callout.revealed .callout-body strong {
  animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.22s both;
}
.callout.revealed .callout-body {
  animation: fadeIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.32s both;
}

/* ─ Sekbid card ──────────────────────────────────────────── */
/* Header: badge → emoji → judul → subtitle, satu per satu */
.sekbid-card.revealed .sekbid-letter-badge {
  animation: scalePop 0.65s cubic-bezier(0.34, 1.56, 0.64, 1) 0.06s both;
}
.sekbid-card.revealed .sekbid-emoji {
  animation: scalePop 0.65s cubic-bezier(0.34, 1.56, 0.64, 1) 0.18s both;
}
.sekbid-card.revealed .sekbid-head-text h4 {
  animation: fadeUp 0.65s cubic-bezier(0.22, 1, 0.36, 1) 0.30s both;
}
.sekbid-card.revealed .sekbid-head-text p {
  animation: fadeIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.42s both;
}

/* Kolom tidak lagi fade sebagai blok – biarkan transparan, yang animate adalah isinya */
.sekbid-card.revealed .sekbid-col { opacity: 1; }

/* Kolom 1: heading h5 lalu li satu per satu */
.sekbid-card.revealed .sekbid-col:nth-child(1) h5          { animation: slideRight 0.6s cubic-bezier(0.22,1,0.36,1) 0.54s both; }
.sekbid-card.revealed .sekbid-col:nth-child(1) ul li:nth-child(1) { animation: slideRight 0.55s cubic-bezier(0.22,1,0.36,1) 0.66s both; }
.sekbid-card.revealed .sekbid-col:nth-child(1) ul li:nth-child(2) { animation: slideRight 0.55s cubic-bezier(0.22,1,0.36,1) 0.78s both; }
.sekbid-card.revealed .sekbid-col:nth-child(1) ul li:nth-child(3) { animation: slideRight 0.55s cubic-bezier(0.22,1,0.36,1) 0.90s both; }
.sekbid-card.revealed .sekbid-col:nth-child(1) ul li:nth-child(4) { animation: slideRight 0.55s cubic-bezier(0.22,1,0.36,1) 1.02s both; }
.sekbid-card.revealed .sekbid-col:nth-child(1) ul li:nth-child(5) { animation: slideRight 0.55s cubic-bezier(0.22,1,0.36,1) 1.14s both; }

/* Kolom 2: mulai setelah kolom 1 selesai ~1.28s */
.sekbid-card.revealed .sekbid-col:nth-child(2) h5          { animation: slideRight 0.6s cubic-bezier(0.22,1,0.36,1) 1.28s both; }
.sekbid-card.revealed .sekbid-col:nth-child(2) ul li:nth-child(1) { animation: slideRight 0.55s cubic-bezier(0.22,1,0.36,1) 1.40s both; }
.sekbid-card.revealed .sekbid-col:nth-child(2) ul li:nth-child(2) { animation: slideRight 0.55s cubic-bezier(0.22,1,0.36,1) 1.52s both; }
.sekbid-card.revealed .sekbid-col:nth-child(2) ul li:nth-child(3) { animation: slideRight 0.55s cubic-bezier(0.22,1,0.36,1) 1.64s both; }
.sekbid-card.revealed .sekbid-col:nth-child(2) ul li:nth-child(4) { animation: slideRight 0.55s cubic-bezier(0.22,1,0.36,1) 1.76s both; }
.sekbid-card.revealed .sekbid-col:nth-child(2) ul li:nth-child(5) { animation: slideRight 0.55s cubic-bezier(0.22,1,0.36,1) 1.88s both; }

/* Kolom 3: mulai setelah kolom 2 selesai ~2.02s */
.sekbid-card.revealed .sekbid-col:nth-child(3) h5          { animation: slideRight 0.6s cubic-bezier(0.22,1,0.36,1) 2.02s both; }
.sekbid-card.revealed .sekbid-col:nth-child(3) ul li:nth-child(1) { animation: slideRight 0.55s cubic-bezier(0.22,1,0.36,1) 2.14s both; }
.sekbid-card.revealed .sekbid-col:nth-child(3) ul li:nth-child(2) { animation: slideRight 0.55s cubic-bezier(0.22,1,0.36,1) 2.26s both; }
.sekbid-card.revealed .sekbid-col:nth-child(3) ul li:nth-child(3) { animation: slideRight 0.55s cubic-bezier(0.22,1,0.36,1) 2.38s both; }
.sekbid-card.revealed .sekbid-col:nth-child(3) ul li:nth-child(4) { animation: slideRight 0.55s cubic-bezier(0.22,1,0.36,1) 2.50s both; }
.sekbid-card.revealed .sekbid-col:nth-child(3) ul li:nth-child(5) { animation: slideRight 0.55s cubic-bezier(0.22,1,0.36,1) 2.62s both; }

/* ─ Timeline ─────────────────────────────────────────────── */
.timeline.revealed .tl-item:nth-child(1) { animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.08s both; }
.timeline.revealed .tl-item:nth-child(2) { animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.22s both; }
.timeline.revealed .tl-item:nth-child(3) { animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.36s both; }
.timeline.revealed .tl-item:nth-child(4) { animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.50s both; }
.timeline.revealed .tl-item:nth-child(5) { animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.64s both; }
.timeline.revealed .tl-item:nth-child(6) { animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.78s both; }
.timeline.revealed .tl-dot {
  animation: scalePop 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 0.06s both;
}
.timeline.revealed .tl-title {
  animation: slideRight 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.14s both;
}
.timeline.revealed .tl-body {
  animation: fadeIn 0.75s cubic-bezier(0.22, 1, 0.36, 1) 0.28s both;
}

/* ─ Principle block ──────────────────────────────────────── */
.principle-block.revealed .p-title {
  animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.08s both;
}
.principle-block.revealed .p-item:nth-child(1) { animation: fadeUp 0.75s cubic-bezier(0.22, 1, 0.36, 1) 0.18s both; }
.principle-block.revealed .p-item:nth-child(2) { animation: fadeUp 0.75s cubic-bezier(0.22, 1, 0.36, 1) 0.30s both; }
.principle-block.revealed .p-item:nth-child(3) { animation: fadeUp 0.75s cubic-bezier(0.22, 1, 0.36, 1) 0.42s both; }
.principle-block.revealed .p-item:nth-child(4) { animation: fadeUp 0.75s cubic-bezier(0.22, 1, 0.36, 1) 0.54s both; }
.principle-block.revealed .p-item:nth-child(5) { animation: fadeUp 0.75s cubic-bezier(0.22, 1, 0.36, 1) 0.66s both; }
.principle-block.revealed .p-item:nth-child(6) { animation: fadeUp 0.75s cubic-bezier(0.22, 1, 0.36, 1) 0.78s both; }
.principle-block.revealed .p-num {
  animation: numberPop 0.75s cubic-bezier(0.34, 1.56, 0.64, 1) 0.06s both;
}

/* ─ Eval card ────────────────────────────────────────────── */
.eval-card.revealed .ec-icon {
  animation: scalePop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.12s both;
}
.eval-card.revealed .ec-title {
  animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.30s both;
}
.eval-card.revealed .ec-desc {
  animation: fadeIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.46s both;
}

/* ─ Step flow ────────────────────────────────────────────── */
.step-flow.revealed .sf-step:nth-child(1) { animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.08s both; }
.step-flow.revealed .sf-step:nth-child(2) { animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.20s both; }
.step-flow.revealed .sf-step:nth-child(3) { animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.32s both; }
.step-flow.revealed .sf-step:nth-child(4) { animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.44s both; }
.step-flow.revealed .sf-step:nth-child(5) { animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.56s both; }
.step-flow.revealed .sf-step:nth-child(6) { animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.68s both; }

/* ─ Flow vertical ────────────────────────────────────────── */
.flow.revealed .flow-step:nth-child(1) { animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.08s both; }
.flow.revealed .flow-step:nth-child(2) { animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.20s both; }
.flow.revealed .flow-step:nth-child(3) { animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.32s both; }
.flow.revealed .flow-step:nth-child(4) { animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.44s both; }
.flow.revealed .flow-step:nth-child(5) { animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.56s both; }
.flow.revealed .flow-arrow { animation: fadeIn 0.6s ease 0.18s both; }

/* ─ Diagram wrap ─────────────────────────────────────────── */
.diagram-wrap.revealed > div > div:nth-child(odd):not([style*="color:#bbb"]) {
  animation: scaleIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
}

/* ─ Table rows ───────────────────────────────────────────── */
.table-wrap.revealed table thead tr { animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.08s both; }
.table-wrap.revealed table tbody tr:nth-child(1) { animation: slideRight 0.65s cubic-bezier(0.22, 1, 0.36, 1) 0.18s both; }
.table-wrap.revealed table tbody tr:nth-child(2) { animation: slideRight 0.65s cubic-bezier(0.22, 1, 0.36, 1) 0.28s both; }
.table-wrap.revealed table tbody tr:nth-child(3) { animation: slideRight 0.65s cubic-bezier(0.22, 1, 0.36, 1) 0.38s both; }
.table-wrap.revealed table tbody tr:nth-child(4) { animation: slideRight 0.65s cubic-bezier(0.22, 1, 0.36, 1) 0.48s both; }
.table-wrap.revealed table tbody tr:nth-child(5) { animation: slideRight 0.65s cubic-bezier(0.22, 1, 0.36, 1) 0.58s both; }
.table-wrap.revealed table tbody tr:nth-child(6) { animation: slideRight 0.65s cubic-bezier(0.22, 1, 0.36, 1) 0.68s both; }
.table-wrap.revealed table tbody tr:nth-child(7) { animation: slideRight 0.65s cubic-bezier(0.22, 1, 0.36, 1) 0.78s both; }
.table-wrap.revealed table tbody tr:nth-child(8) { animation: slideRight 0.65s cubic-bezier(0.22, 1, 0.36, 1) 0.88s both; }

/* ─ Sub-section h3 ───────────────────────────────────────── */
.sub-section.revealed h3 {
  animation: slideRight 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.08s both;
}
.sub-section.revealed h3::before {
  animation: lineGrow 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0s both;
  transform-origin: left center;
}

/* ─ Prose ────────────────────────────────────────────────── */
.prose.revealed {
  animation: fadeUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.06s both;
}

/* ─ Closing section ──────────────────────────────────────── */
.closing.revealed h2 {
  animation: fadeUpFar 1s cubic-bezier(0.22, 1, 0.36, 1) 0.15s both;
}
.closing.revealed > p:nth-child(2) { animation: fadeUp 0.85s cubic-bezier(0.22, 1, 0.36, 1) 0.32s both; }
.closing.revealed > p:nth-child(3) { animation: fadeUp 0.85s cubic-bezier(0.22, 1, 0.36, 1) 0.46s both; }
.closing.revealed ul li:nth-child(1) { animation: slideRight 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.56s both; }
.closing.revealed ul li:nth-child(2) { animation: slideRight 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.68s both; }
.closing.revealed ul li:nth-child(3) { animation: slideRight 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.80s both; }
.closing.revealed ul li:nth-child(4) { animation: slideRight 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.92s both; }
.closing.revealed ul li:nth-child(5) { animation: slideRight 0.7s cubic-bezier(0.22, 1, 0.36, 1) 1.04s both; }
.closing.revealed .sig-box { animation: fadeUp 0.85s cubic-bezier(0.22, 1, 0.36, 1) 1.14s both; }

/* ─ Step-flow-v ──────────────────────────────────────────── */
.step-flow-v.revealed .sfv-item:nth-child(1) { animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.06s both; }
.step-flow-v.revealed .sfv-item:nth-child(2) { animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.18s both; }
.step-flow-v.revealed .sfv-item:nth-child(3) { animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.30s both; }
.step-flow-v.revealed .sfv-item:nth-child(4) { animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.42s both; }
.step-flow-v.revealed .sfv-item:nth-child(5) { animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.54s both; }
.step-flow-v.revealed .sfv-item:nth-child(6) { animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.66s both; }

/* ─ List items standalone ────────────────────────────────── */
.list.revealed li:nth-child(1)  { animation: slideRight 0.65s cubic-bezier(0.22, 1, 0.36, 1) 0.08s both; }
.list.revealed li:nth-child(2)  { animation: slideRight 0.65s cubic-bezier(0.22, 1, 0.36, 1) 0.18s both; }
.list.revealed li:nth-child(3)  { animation: slideRight 0.65s cubic-bezier(0.22, 1, 0.36, 1) 0.28s both; }
.list.revealed li:nth-child(4)  { animation: slideRight 0.65s cubic-bezier(0.22, 1, 0.36, 1) 0.38s both; }
.list.revealed li:nth-child(5)  { animation: slideRight 0.65s cubic-bezier(0.22, 1, 0.36, 1) 0.48s both; }
.list.revealed li:nth-child(6)  { animation: slideRight 0.65s cubic-bezier(0.22, 1, 0.36, 1) 0.58s both; }
.list.revealed li:nth-child(7)  { animation: slideRight 0.65s cubic-bezier(0.22, 1, 0.36, 1) 0.68s both; }
.list.revealed li:nth-child(8)  { animation: slideRight 0.65s cubic-bezier(0.22, 1, 0.36, 1) 0.78s both; }
.list.revealed li:nth-child(9)  { animation: slideRight 0.65s cubic-bezier(0.22, 1, 0.36, 1) 0.88s both; }
.list.revealed li:nth-child(10) { animation: slideRight 0.65s cubic-bezier(0.22, 1, 0.36, 1) 0.98s both; }

/* ─ Hover micro-interactions on interactive boxes ──────── */
.card {
  transition: transform 0.2s cubic-bezier(.34,1.2,.64,1), box-shadow 0.2s ease;
}
.card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(0,0,0,.10);
}
.sekbid-card {
  transition: box-shadow 0.2s ease;
}
.sekbid-card:hover {
  box-shadow: 0 6px 20px rgba(0,0,0,.08);
}
.eval-card {
  transition: transform 0.2s cubic-bezier(.34,1.2,.64,1), box-shadow 0.2s ease;
}
.eval-card:hover {
  transform: translateY(-3px) scale(1.02);
  box-shadow: 0 8px 20px rgba(0,0,0,.09);
}
.callout {
  transition: transform 0.2s cubic-bezier(.34,1.2,.64,1);
}
.callout:hover {
  transform: translateX(4px);
}

.tag-added {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: #fff3cd;
  border: 1px solid #ffd966;
  color: #7d5a00;
  border-radius: 4px;
  padding: 1px 7px;
  font-size: 11px;
  font-weight: 600;
  margin-left: 6px;
  vertical-align: middle;
}

/* ── RESPONSIVE GRIDS ─────────────────────────────────────────── */
.cards-2 { grid-template-columns: 1fr 1fr; }
.cards-3 { grid-template-columns: 1fr 1fr 1fr; }
.mt-16   { margin-top: 16px; }

/* ── HAMBURGER BUTTON ────────────────────────────────────────── */
.hamburger {
  display: none;
  position: fixed;
  top: 14px; left: 14px;
  z-index: 300;
  width: 40px; height: 40px;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 8px;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 5px;
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,.08);
}
.hamburger span {
  display: block;
  width: 18px; height: 2px;
  background: var(--text);
  border-radius: 2px;
  transition: all .25s;
}
.hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

/* ── SIDEBAR OVERLAY ─────────────────────────────────────────── */
.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.4);
  z-index: 99;
}

/* ── FLOW-H RESPONSIVE ───────────────────────────────────────── */
.flow-h { flex-wrap: wrap; gap: 6px; }
.flow-h .fh-step { flex-wrap: wrap; }

/* ── TABLE SCROLL WRAP ───────────────────────────────────────── */
.table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

/* ── DIAGRAM ALUR WRAP ───────────────────────────────────────── */
.diagram-wrap {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  background: #f7f6f3;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 20px;
}
.diagram-inner {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
  justify-content: center;
  min-width: 300px;
}

/* ─ 900px: show hamburger, hide sidebar ─────────────────────── */
@media (max-width: 900px) {
  :root { --sidebar-w: 0px; }
  .main { margin-left: 0; }
  .content { padding: 0 16px 60px; }
  .cover {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 72px 24px 48px;
  }
  .cover-inner {
    text-align: center;
  }
  .cover h1 {
    max-width: 100%;
    margin-left: auto;
    margin-right: auto;
  }
  .cover-chips {
    justify-content: center;
  }
  .cover-scroll {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    right: auto;
    font-size: 12px;
    color: rgba(255,255,255,.55);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    animation: bounce 2s infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(5px); }
  }
  #progress-bar { left: 0; }

  .hamburger { display: flex; }

  .sidebar {
    transform: translateX(-100%);
    transition: transform .28s cubic-bezier(.4,0,.2,1);
    width: 260px;
    display: flex;
  }
  .sidebar.open { transform: translateX(0); }
  .sidebar-overlay.open { display: block; }

  /* Step-flow vertikal di mobile */
  .step-flow {
    flex-direction: column;
    align-items: center;
    gap: 2px;
    padding: 16px 20px;
  }
  .sf-step {
    flex-direction: column;
    align-items: center;
    gap: 2px;
    width: 100%;
  }
  .sf-box {
    width: 100%;
    white-space: normal;
  }
  .sf-arrow {
    transform: rotate(90deg);
    display: block;
    padding: 2px 0;
  }
}

/* ─ 640px: collapse 3-col → 2-col ──────────────────────────── */
@media (max-width: 640px) {
  .cards-3 { grid-template-columns: 1fr 1fr; }
  .sekbid-body { grid-template-columns: 1fr 1fr; }
  .bab h2 { font-size: 21px; color: white; }
  .cover h1 { font-size: 28px; }
  .cover-sub { font-size: 14px; }
  .closing { padding: 36px 20px; }
  .sig-box { justify-content: center; }
  .principle-grid { grid-template-columns: 1fr; }
  .compare-table { font-size: 12px; }
  .compare-table th, .compare-table td { padding: 8px 10px; }
}

/* ─ 480px: fully single column ─────────────────────────────── */
@media (max-width: 480px) {
  .cards   { grid-template-columns: 1fr !important; }
  .cards-2 { grid-template-columns: 1fr; }
  .cards-3 { grid-template-columns: 1fr; }
  .sekbid-body { grid-template-columns: 1fr; }
  .flow-h { flex-direction: column; align-items: flex-start; gap: 4px; }
  .flow-h .fh-arrow { transform: rotate(90deg); padding: 2px 0 2px 12px; }
  .fh-box { white-space: normal; width: 100%; text-align: left; }
  .cover { padding: 72px 20px 56px; }
  .cover-chips { gap: 6px; }
  .chip { font-size: 11px; padding: 4px 10px; }
  .bab-icon { width: 40px; height: 40px; font-size: 20px; }
  .bab h2 { font-size: 19px; color: white; }
  .content { padding: 0 12px 60px; }
  .tl-title { font-size: 13.5px; }
  .tl-body { font-size: 12.5px; }
  .prose { font-size: 13.5px; }
  .list li { font-size: 13.5px; }
  #back-top { bottom: 16px; right: 16px; }
}

/* ── STEP FLOW (replaces flow-h) ─────────────────────────────── */
.step-flow {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 6px;
  margin: 14px 0 20px;
  justify-content: center;
  background: #f7f6f3;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 18px;
}

.sf-step {
  display: flex;
  align-items: center;
  gap: 6px;
}

.sf-box {
  background: #fff;
  border: 1.5px solid var(--border);
  border-radius: 24px;
  padding: 7px 16px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.3;
  text-align: center;
  white-space: nowrap;
}

.sf-box.accent { background: #eaf4ee; border-color: #b2d8c2; color: var(--accent-1); }
.sf-box.accent-blue { background: #e8f0fc; border-color: #c5dcf8; color: var(--accent-2); }
.sf-box.accent-yellow { background: #fff9e6; border-color: #ffe08a; color: #7d5a00; }
.sf-box.accent-orange { background: #fdeee8; border-color: #f1b49a; color: var(--accent-5); }

.sf-arrow {
  color: #bbb;
  font-size: 16px;
  flex-shrink: 0;
  line-height: 1;
}

/* Vertical step-flow (inside card, for alur koordinasi) */
.step-flow-v {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  margin: 8px 0;
}

.sfv-item {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.sfv-box {
  background: #fff;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  padding: 6px 18px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  width: auto;
  white-space: nowrap;
}

.sfv-arrow {
  color: #bbb;
  font-size: 14px;
  padding: 2px 0;
  text-align: center;
}

/* ── EVAL ICON GRID ──────────────────────────────────────────── */
.eval-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin: 16px 0;
}

.eval-card {
  background: white;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 12px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.eval-card .ec-icon { font-size: 28px; margin-bottom: 8px; }
.eval-card .ec-title { font-size: 13px; font-weight: 700; margin-bottom: 4px; color: var(--text); }
.eval-card .ec-desc { font-size: 12px; color: var(--muted); line-height: 1.5; }

@media (max-width: 640px) {
  .eval-grid { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 480px) {
  .eval-grid { grid-template-columns: 1fr; }
}

/* ══════════════════════════════════════════════════════════════
   LOCK SCREEN
══════════════════════════════════════════════════════════════ */
#lock-screen {
  position: fixed;
  inset: 0;
  z-index: 99999;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  background: #e8e8e4;
  transition: opacity 0.7s cubic-bezier(0.22, 1, 0.36, 1),
              transform 0.7s cubic-bezier(0.22, 1, 0.36, 1);
}

#lock-screen.unlocking {
  opacity: 0;
  transform: scale(1.04);
  pointer-events: none;
}

/* Background image – hitam putih */
#lock-bg {
  position: absolute;
  inset: 0;
  background-image: url('https://images.unsplash.com/photo-1555993539-1732b0258235?w=1600&q=85');
  background-size: cover;
  background-position: center 55%;
  filter: grayscale(100%) brightness(0.82) contrast(1.1);
  opacity: 0.22;
  z-index: 0;
}

/* Orbs dekoratif */
#lock-screen::before {
  content: '';
  position: absolute;
  top: -120px; right: -120px;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(100,100,100,.10) 0%, transparent 70%);
  border-radius: 50%;
  z-index: 1;
  pointer-events: none;
}
#lock-screen::after {
  content: '';
  position: absolute;
  bottom: -80px; left: -80px;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(80,80,80,.07) 0%, transparent 70%);
  border-radius: 50%;
  z-index: 1;
  pointer-events: none;
}

/* Frosted glass card */
#lock-card {
  position: relative;
  z-index: 2;
  background: rgba(255, 255, 255, 0.55);
  backdrop-filter: blur(28px) saturate(1.3);
  -webkit-backdrop-filter: blur(28px) saturate(1.3);
  border: 1.5px solid rgba(255, 255, 255, 0.75);
  border-radius: 32px;
  padding: 48px 44px 36px;
  width: min(420px, calc(100vw - 40px));
  box-shadow:
    0 8px 40px rgba(0,0,0,.14),
    0 2px 8px rgba(0,0,0,.08),
    inset 0 1px 0 rgba(255,255,255,.9);
  animation: lockCardIn 1s cubic-bezier(0.22, 1, 0.36, 1) both;
}

@keyframes lockCardIn {
  from { opacity: 0; transform: translateY(36px) scale(0.95); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* Logo lingkaran */
#lock-logo-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 22px;
  animation: lockCardIn 1.1s cubic-bezier(0.22, 1, 0.36, 1) 0.1s both;
}

#lock-logo-circle {
  width: 64px; height: 64px;
  border-radius: 50%;
  background: transparent;
  display: flex; align-items: center; justify-content: center;
  font-size: 34px;
  box-shadow: 0 8px 32px rgba(0,0,0,.18), 0 2px 10px rgba(0,0,0,.10);
  margin-bottom: 12px;
  border: 2.5px solid rgba(255,255,255,.5);
}

#lock-org-name {
  font-family: 'Lora', serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: #2d4a3c;
  text-align: center;
}

#lock-org-sub {
  font-size: 11px;
  color: #6b7c72;
  text-align: center;
  margin-top: 3px;
  letter-spacing: .04em;
}

/* Judul kartu */
#lock-title {
  font-family: 'Lora', serif;
  font-size: 22px;
  font-weight: 700;
  color: #1a1915;
  text-align: center;
  margin-bottom: 6px;
  animation: lockCardIn 1.1s cubic-bezier(0.22, 1, 0.36, 1) 0.2s both;
}

#lock-desc {
  font-size: 13px;
  color: #6b6860;
  text-align: center;
  margin-bottom: 28px;
  line-height: 1.6;
  animation: lockCardIn 1s cubic-bezier(0.22, 1, 0.36, 1) 0.32s both;
}

/* Input group */
/* ── Lock input wrap ── */
#lock-input-wrap {
  position: relative;
  animation: lockCardIn 1s cubic-bezier(0.22,1,0.36,1) 0.42s both;
}

/* Input asli: transparan, hanya menutupi area teks (bukan area tombol mata) */
#lock-input {
  position: absolute;
  top: 0; left: 0;
  width: calc(100% - 52px); height: 100%;
  opacity: 0;
  cursor: text;
  border: none;
  background: transparent;
  outline: none;
  padding: 0 8px 0 20px;
  box-sizing: border-box;
  font-size: 14.5px;
  color: transparent;
  caret-color: transparent;
  z-index: 3;
}

/* Shape overlay: visual, di belakang input, tidak memblokir klik */
#lock-shape-display {
  position: relative;
  width: 100%; height: 52px;
  padding: 0 52px 0 20px;
  border-radius: 50px;
  border: 2px solid rgba(45,106,79,.22);
  background: rgba(255,255,255,.85);
  outline: none;
  box-shadow: 0 2px 12px rgba(0,0,0,.06), inset 0 1px 3px rgba(0,0,0,.04);
  transition: border-color .2s, box-shadow .2s;
  display: flex;
  align-items: center;
  overflow: hidden;
  box-sizing: border-box;
  pointer-events: none;
  user-select: none;
  z-index: 1;
}

#lock-input:focus ~ #lock-shape-display {
  border-color: rgba(45,106,79,.6);
  box-shadow: 0 0 0 4px rgba(45,106,79,.12), 0 2px 12px rgba(0,0,0,.06);
}
#lock-shape-display.error {
  border-color: rgba(181,69,27,.5);
  box-shadow: 0 0 0 4px rgba(181,69,27,.10);
  animation: lockShake 0.45s cubic-bezier(.36,.07,.19,.97);
}

#lock-shape-placeholder {
  color: #b0aba3;
  font-size: 14.5px;
  pointer-events: none;
  position: absolute;
  left: 20px;
}

#lock-shape-overlay {
  display: flex;
  align-items: center;
  flex-wrap: nowrap;
  gap: 6px;
  min-width: 0;
  will-change: transform;
  transition: transform 0.08s ease;
}

/* Cursor dibuat dinamis oleh JS di dalam #lock-shape-overlay */
@keyframes cursorBlink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

/* Individual shape tokens */
.shape-token {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.15s;
  animation: shapePop 0.2s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  border-radius: 4px;
  padding: 2px 1px;
}
.shape-token.selected {
  background: rgba(45, 106, 79, 0.25);
  border-radius: 4px;
  outline: 1.5px solid rgba(45, 106, 79, 0.45);
  outline-offset: 0px;
}
.shape-token.selected.show-char {
  color: #1b4332;
}
@keyframes shapePop {
  from { transform: scale(0) rotate(-30deg); opacity: 0; }
  to   { transform: scale(1) rotate(0deg);   opacity: 1; }
}
.shape-token.show-char {
  font-size: 13px;
  font-family: monospace;
  color: #2d6a4f;
  font-weight: 700;
  min-width: 14px;
  text-align: center;
}
.shape-token svg {
  overflow: visible;
}

#lock-input.error {
  /* keep for JS compat */
}

@keyframes lockShake {
  0%, 100% { transform: translateX(0); }
  15% { transform: translateX(-8px); }
  35% { transform: translateX(8px); }
  55% { transform: translateX(-5px); }
  75% { transform: translateX(5px); }
}

/* Toggle visibility icon */
#lock-toggle {
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  color: #9a9590;
  font-size: 18px;
  padding: 4px;
  display: flex; align-items: center; justify-content: center;
  transition: color .15s;
  z-index: 10;
  pointer-events: all;
}
#lock-toggle:hover { color: #2d6a4f; }

/* Error message */
#lock-error {
  font-size: 12.5px;
  color: #b5451b;
  text-align: center;
  margin-top: 0;
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  transform: translateY(-4px);
  transition: opacity .2s, transform .2s, max-height .2s, margin-top .2s;
  font-weight: 500;
}
#lock-error.show { opacity: 1; transform: translateY(0); max-height: 40px; margin-top: 10px; }

/* Submit button */
#lock-btn {
  display: block;
  width: 100%;
  margin-top: 12px;
  padding: 14px 24px;
  border-radius: 50px;
  border: none;
  background: linear-gradient(135deg, #1a4a30 0%, #2d6a4f 55%, #3a8a63 100%);
  color: white;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 14.5px;
  font-weight: 700;
  letter-spacing: .03em;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(45,106,79,.35), 0 1px 4px rgba(0,0,0,.10);
  transition: box-shadow .2s, transform .15s, opacity .2s;
  animation: lockCardIn 1s cubic-bezier(0.22, 1, 0.36, 1) 0.52s both;
}
#lock-btn:hover {
  box-shadow: 0 6px 28px rgba(45,106,79,.45), 0 2px 8px rgba(0,0,0,.12);
  transform: translateY(-1px);
}
#lock-btn:active { transform: translateY(0); opacity: .9; }

/* Lock divider */
#lock-divider {
  display: flex; align-items: center; gap: 12px;
  margin: 20px 0 0;
  animation: lockCardIn 1s cubic-bezier(0.22, 1, 0.36, 1) 0.6s both;
}
#lock-divider::before, #lock-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: rgba(0,0,0,.10);
}
#lock-divider span {
  font-size: 11px;
  color: #a0a09a;
  letter-spacing: .06em;
}

/* ── PAGE TRANSITION OVERLAY ────────────────────────────────── */
#page-transition {
  position: fixed;
  inset: 0;
  z-index: 99998;
  background: linear-gradient(160deg, #0d3b26 0%, #1a5c3e 50%, #1d4e89 100%);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.4s ease;
}
#page-transition.flash-in {
  opacity: 1;
  transition: opacity 0.3s ease;
}
#page-transition.flash-out {
  opacity: 0;
  transition: opacity 0.5s ease 0.1s;
}

/* ── MAIN CONTENT — hidden until unlock ─────────────────────── */
#app-content {
  opacity: 0;
  transition: opacity 0.6s cubic-bezier(0.22, 1, 0.36, 1);
}
#app-content.visible { opacity: 1; }
</style>
  </head>

<script>
// ══════════════════════════════════════════════════════════════
// MAIN PAGE INIT (harus global agar bisa dipanggil setelah decrypt)
// ══════════════════════════════════════════════════════════════
function initMainPage() {
  // Progress bar
  const bar  = document.getElementById('progress-bar');
  const bTop = document.getElementById('back-top');
  if (bar) {
    window.addEventListener('scroll', () => {
      const scrolled = window.scrollY;
      const total    = document.body.scrollHeight - window.innerHeight;
      bar.style.width = (scrolled / total * 100) + '%';
      if (bTop) bTop.classList.toggle('visible', scrolled > 400);
    });
  }

  // Hamburger menu
  const hamburger = document.getElementById('hamburger');
  const sidebar   = document.getElementById('sidebar');
  const overlay   = document.getElementById('overlay');
  if (hamburger && sidebar && overlay) {
    function closeSidebar() {
      hamburger.classList.remove('open');
      sidebar.classList.remove('open');
      overlay.classList.remove('open');
    }
    hamburger.addEventListener('click', () => {
      const isOpen = sidebar.classList.contains('open');
      isOpen ? closeSidebar() : (hamburger.classList.add('open'), sidebar.classList.add('open'), overlay.classList.add('open'));
    });
    overlay.addEventListener('click', closeSidebar);
    document.querySelectorAll('.nav-item').forEach(n => n.addEventListener('click', () => {
      if (window.innerWidth <= 900) closeSidebar();
    }));
  }

  // Active nav highlight
  const navItems = document.querySelectorAll('.nav-item');
  const sections = document.querySelectorAll('[id]');
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        navItems.forEach(n => n.classList.remove('active'));
        const link = document.querySelector(`.nav-item[href="#${e.target.id}"]`);
        if (link) link.classList.add('active');
      }
    });
  }, { rootMargin: '-20% 0px -70% 0px' });
  sections.forEach(s => obs.observe(s));

  // Scroll reveal
  const revealSelectors = [
    '.bab-header','.sub-section','.prose','.callout','.card','.sekbid-card',
    '.timeline','.step-flow','.step-flow-v','.diagram-wrap','.principle-block',
    '.eval-grid','.table-wrap','.divider','.flow','.closing',
  ];
  const textRevealSelectors = [
    'h4.label','.list','.list li','.tl-item','.tl-title','.tl-body','.p-item',
    '.prose p','.closing p','.closing ul li','.card ul li','.sekbid-col ul li',
    '.chip','.cover-tag','.cover-scroll','.sf-step','.flow-step','.fh-step',
    '.sfv-item','.eval-card','.bab-label','table tr','.card-attention','.flow-h',
  ];

  document.querySelectorAll('.cards').forEach(g => g.classList.add('reveal-group'));
  document.querySelectorAll('.eval-grid').forEach(g => g.classList.add('reveal-group'));
  document.querySelectorAll('.principle-grid').forEach(g => g.classList.add('reveal-group'));

  revealSelectors.forEach(sel => {
    document.querySelectorAll(sel).forEach(el => {
      if (!el.closest('.reveal-group') && !el.closest('.reveal')) el.classList.add('reveal');
    });
  });
  textRevealSelectors.forEach((sel) => {
    document.querySelectorAll(sel).forEach((el, i) => {
      if (el.closest('.reveal-group') || el.classList.contains('reveal')) return;
      const parentReveal = el.closest('.reveal');
      if (parentReveal && !parentReveal.classList.contains('reveal-group')) return;
      el.classList.add('reveal');
      el.style.transitionDelay = (i * 0.04) + 's';
    });
  });

  const revealObs = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('revealed');
        entry.target.querySelectorAll(':scope > *').forEach(child => child.classList.add('revealed'));
        revealObs.unobserve(entry.target);
      }
    });
  }, { threshold: 0.08, rootMargin: '0px 0px -60px 0px' });
  document.querySelectorAll('.reveal, .reveal-group').forEach(el => revealObs.observe(el));
}

// ══════════════════════════════════════════════════════════════
// LOCK SCREEN — AES-256-GCM + PBKDF2-SHA256 (310,000 iterations)
// Konten halaman dienkripsi. Password tidak tersimpan di kode.
// ══════════════════════════════════════════════════════════════
(function() {

  // ══════════════════════════════════════════════════════════════
  // CUSTOM SHAPE PASSWORD INPUT
  // ══════════════════════════════════════════════════════════════

  // Vibrant — cerah dan kuat, sesuai tema IRMA
  const COLORS = [
    '#00b96b', // vibrant emerald
    '#1a8fff', // electric blue
    '#c849ff', // vivid purple
    '#ff7a00', // vivid orange
    '#e6c200', // golden yellow
    '#ff2d6b', // hot pink
    '#00c4b4', // vivid teal
    '#76d400', // lime green
  ];

  // Shape SVG — semua sudut memakai cubic bezier untuk lekukan sempurna
  const SHAPES = [

    // 1. Lingkaran sempurna
    (c) => `<svg width="14" height="14" viewBox="0 0 14 14"><circle cx="7" cy="7" r="6" fill="${c}"/></svg>`,

    // 2. Squircle (rounded square super smooth — ios icon style)
    (c) => `<svg width="14" height="14" viewBox="0 0 14 14"><path d="M7,1 C10.5,1 13,3.5 13,7 C13,10.5 10.5,13 7,13 C3.5,13 1,10.5 1,7 C1,3.5 3.5,1 7,1 Z" fill="${c}"/></svg>`,

    // 3. Diamond rounded — semua 4 sudut benar-benar melengkung
    (c) => `<svg width="14" height="14" viewBox="0 0 14 14"><path d="M7,1 C7.9,1 9.5,3.2 12,7 C9.5,10.8 7.9,13 7,13 C6.1,13 4.5,10.8 2,7 C4.5,3.2 6.1,1 7,1 Z" fill="${c}"/></svg>`,

    // 4. Segitiga rounded — tiap sudut dicurve dengan cubic bezier
    (c) => `<svg width="14" height="14" viewBox="0 0 14 14"><path d="M7,1.5 C7.7,1.5 8.3,2.1 11.8,11 C11.4,12 10.5,12.5 7,12.5 C3.5,12.5 2.6,12 2.2,11 C5.7,2.1 6.3,1.5 7,1.5 Z" fill="${c}"/></svg>`,

    // 5. Bintang 4 titik — lembut & bulat
    (c) => `<svg width="14" height="14" viewBox="0 0 14 14"><path d="M7,1 C7.4,3.2 7.4,5 7,7 C9.2,6.6 11,6.6 13,7 C11,7.4 9.2,7.4 7,7 C7.4,8.8 7.4,10.8 7,13 C6.6,10.8 6.6,8.8 7,7 C4.8,7.4 3,7.4 1,7 C3,6.6 4.8,6.6 7,7 C6.6,5 6.6,3.2 7,1 Z" fill="${c}"/></svg>`,

    // 6. Teardrop / tetes air
    (c) => `<svg width="12" height="14" viewBox="0 0 12 14"><path d="M6,1 C8.5,3 11,6 11,9 C11,11.8 8.8,13 6,13 C3.2,13 1,11.8 1,9 C1,6 3.5,3 6,1 Z" fill="${c}"/></svg>`,

    // 7. Hexagon rounded — tiap vertex dilengkungkan
    (c) => `<svg width="14" height="14" viewBox="0 0 14 14"><path d="M7,1 C8,1 10.5,2.5 12.5,4.8 C13,5.8 13,8.2 12.5,9.2 C10.5,11.5 8,13 7,13 C6,13 3.5,11.5 1.5,9.2 C1,8.2 1,5.8 1.5,4.8 C3.5,2.5 6,1 7,1 Z" fill="${c}"/></svg>`,

    // 8. Plus/cross rounded — ujung membulat seperti permen
    (c) => `<svg width="14" height="14" viewBox="0 0 14 14"><rect x="5" y="1" width="4" height="12" rx="2" fill="${c}"/><rect x="1" y="5" width="12" height="4" rx="2" fill="${c}"/></svg>`,
  ];

  const shapeOverlay  = document.getElementById('lock-shape-overlay');
  const realInput     = document.getElementById('lock-input');
  const shapePlaceholder = document.getElementById('lock-shape-placeholder');

  let showChars = false;
  let shapeAssignments = [];

  function getAssignment(index) {
    if (shapeAssignments[index]) return shapeAssignments[index];
    const shapeIdx = (index * 3 + 7) % SHAPES.length;
    const colorIdx = (index * 5 + 2) % COLORS.length;
    shapeAssignments[index] = { shapeIdx, colorIdx };
    return shapeAssignments[index];
  }

  function renderOverlay() {
    const val       = realInput.value;
    const len       = val.length;
    const selStart  = realInput.selectionStart ?? len;
    const selEnd    = realInput.selectionEnd   ?? len;
    const hasSelect = selStart !== selEnd;

    // Tampilkan/sembunyikan placeholder
    shapePlaceholder.style.display = len === 0 ? '' : 'none';

    // Bersihkan overlay, isi ulang
    shapeOverlay.innerHTML = '';

    for (let i = 0; i < len; i++) {
      // Sisipkan kursor visual di posisi selStart (awal seleksi / posisi kursor)
      if (!hasSelect && i === selStart) {
        shapeOverlay.appendChild(makeCursor());
      }

      const token = document.createElement('span');
      token.className = 'shape-token';

      // Tandai token yang termasuk dalam seleksi
      if (hasSelect && i >= selStart && i < selEnd) {
        token.classList.add('selected');
      }

      if (showChars) {
        token.classList.add('show-char');
        token.textContent = val[i];
      } else {
        const { shapeIdx, colorIdx } = getAssignment(i);
        token.innerHTML = SHAPES[shapeIdx](COLORS[colorIdx]);
      }
      shapeOverlay.appendChild(token);
    }

    // Kursor di akhir (hanya jika tidak ada seleksi aktif)
    if (!hasSelect && selStart >= len) {
      shapeOverlay.appendChild(makeCursor());
    }

    // Scroll overlay agar kursor / akhir seleksi selalu terlihat
    requestAnimationFrame(scrollToCursor);
  }

  function makeCursor() {
    const c = document.createElement('span');
    c.id = 'lock-cursor-blink';
    c.style.cssText = 'display:inline-block;width:2px;height:18px;background:#2d6a4f;border-radius:2px;flex-shrink:0;animation:cursorBlink 1s step-end infinite;vertical-align:middle;';
    return c;
  }

  function scrollToCursor() {
    // Gunakan token terakhir yang selected sebagai anchor, fallback ke cursor
    const selectedTokens = shapeOverlay.querySelectorAll('.shape-token.selected');
    const anchorEl  = selectedTokens.length
      ? selectedTokens[selectedTokens.length - 1]
      : document.getElementById('lock-cursor-blink');
    const cursorEl  = anchorEl;
    const displayEl = document.getElementById('lock-shape-display');
    if (!cursorEl || !displayEl || !shapeOverlay) return;

    // Lebar area visible = display - padding kiri - padding kanan (tombol mata)
    const visibleW   = displayEl.clientWidth - 20 - 52;
    // Total lebar konten overlay
    const contentW   = shapeOverlay.scrollWidth;
    // Posisi kursor relatif terhadap overlay (tanpa transform)
    const curTx      = getCurrentTx();
    const cursorLeft = cursorEl.offsetLeft + curTx; // posisi absolut kursor

    let newTx = curTx;

    // Kursor melebihi batas kanan → geser kiri
    if (cursorLeft + cursorEl.offsetWidth + 4 > visibleW) {
      newTx = visibleW - cursorEl.offsetLeft - cursorEl.offsetWidth - 4;
    }
    // Kursor di kiri area visible → geser kanan
    if (cursorEl.offsetLeft + newTx < 0) {
      newTx = -cursorEl.offsetLeft + 4;
    }
    // Clamp: tidak lebih dari 0 (tidak geser konten ke kanan melewati awal)
    newTx = Math.min(0, newTx);
    // Clamp: tidak lebih dari batas kiri konten
    if (contentW > visibleW) newTx = Math.max(visibleW - contentW, newTx);

    shapeOverlay.style.transform = `translateX(${Math.round(newTx)}px)`;
  }

  function getCurrentTx() {
    const t = shapeOverlay.style.transform;
    if (!t) return 0;
    const m = t.match(/-?[\d.]+/);
    return m ? parseFloat(m[0]) : 0;
  }

  // Sinkronisasi: setiap kali input asli berubah, render ulang overlay
  realInput.addEventListener('input', () => { renderOverlay(); });
  realInput.addEventListener('keydown', (e) => {
    // Enter → unlock
    if (e.key === 'Enter') { e.preventDefault(); unlock(); return; }
    // Ctrl+A / Cmd+A → select all, lalu render
    if ((e.ctrlKey || e.metaKey) && e.key === 'a') {
      setTimeout(() => {
        realInput.setSelectionRange(0, realInput.value.length);
        renderOverlay();
      }, 0);
      return;
    }
    setTimeout(renderOverlay, 0);
  });
  realInput.addEventListener('keyup',   () => { renderOverlay(); });
  realInput.addEventListener('click',   () => { renderOverlay(); });
  realInput.addEventListener('select',  () => { renderOverlay(); });

  // Klik di area shape display → fokus ke input asli
  document.getElementById('lock-shape-display').addEventListener('click', () => {
    realInput.focus();
    renderOverlay();
  });

  // Toggle show/hide shapes vs chars
  const lockToggleBtn = document.getElementById('lock-toggle');
  const eyeOpen   = document.getElementById('eye-open');
  const eyeClosed = document.getElementById('eye-closed');

  lockToggleBtn.addEventListener('click', () => {
    showChars = !showChars;
    // Penting: ubah type input agar browser expose nilai karakter asli
    // type=password menyembunyikan karakter dari JS di beberapa browser
    realInput.type = showChars ? 'text' : 'password';
    eyeOpen.style.display   = showChars ? 'block' : 'none';
    eyeClosed.style.display = showChars ? 'none'  : 'block';
    renderOverlay();
    // Kembalikan fokus & posisi kursor
    const pos = realInput.selectionStart;
    realInput.focus();
    realInput.setSelectionRange(pos, pos);
  });

  // Fokus/blur: tampilkan/sembunyikan animasi cursor
  realInput.addEventListener('focus', renderOverlay);
  realInput.addEventListener('blur',  () => {
    const c = document.getElementById('lock-cursor-blink');
    if (c) c.style.opacity = '0';
  });

  window.addEventListener('load', () => { realInput.focus(); renderOverlay(); });


  // ── Custom cursor (langsung aktif saat halaman load)
  function initCursor() {
    if (window.innerWidth <= 900) return;
    const ring = document.createElement('div'); ring.id = 'cursor-ring';
    const dot  = document.createElement('div'); dot.id  = 'cursor-dot';
    document.body.appendChild(ring);
    document.body.appendChild(dot);

    let mouseX = -200, mouseY = -200, ringX = -200, ringY = -200;
    const LERP = 0.28;

    document.addEventListener('mousemove', e => {
      mouseX = e.clientX; mouseY = e.clientY;
      dot.style.left = mouseX + 'px'; dot.style.top = mouseY + 'px';
      const darkSections = [document.getElementById('cover'), document.getElementById('penutup')].filter(Boolean);
      const isOnDark = darkSections.some(el => {
        const r = el.getBoundingClientRect();
        return mouseY >= r.top && mouseY <= r.bottom && mouseX >= r.left && mouseX <= r.right;
      });
      ring.classList.toggle('on-dark', isOnDark);
      dot.classList.toggle('on-dark', isOnDark);
    });
    const hoverTargets = 'a, button, .nav-item, .card, .sekbid-card, .eval-card, .callout, #back-top, .sf-box, .bab-header, #lock-btn, #lock-toggle, #lock-input';
    document.addEventListener('mouseover', e => { if (e.target.closest(hoverTargets)) { ring.classList.add('hovering'); dot.classList.add('hovering'); } });
    document.addEventListener('mouseout',  e => { if (e.target.closest(hoverTargets)) { ring.classList.remove('hovering'); dot.classList.remove('hovering'); } });
    document.addEventListener('mousedown', () => ring.classList.add('clicking'));
    document.addEventListener('mouseup',   () => ring.classList.remove('clicking'));
    function animateCursor() {
      ringX += (mouseX - ringX) * LERP; ringY += (mouseY - ringY) * LERP;
      ring.style.left = ringX + 'px'; ring.style.top = ringY + 'px';
      requestAnimationFrame(animateCursor);
    }
    animateCursor();
    document.addEventListener('mouseleave', () => { ring.style.opacity='0'; dot.style.opacity='0'; });
    document.addEventListener('mouseenter', () => { ring.style.opacity='1'; dot.style.opacity='1'; });
    window.addEventListener('resize', () => {
      if (window.innerWidth <= 900) { ring.style.display='none'; dot.style.display='none'; }
      else { ring.style.display=''; dot.style.display=''; }
    });
  }
  initCursor();

  // ── Derive AES-256 key dari password via PBKDF2-SHA256
  async function deriveKey(password, saltBuf) {
    const keyMat = await crypto.subtle.importKey(
      'raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']
    );
    return crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt: saltBuf, iterations: 310000, hash: 'SHA-256' },
      keyMat,
      { name: 'AES-GCM', length: 256 },
      false, ['decrypt']
    );
  }

  function b64ToBuf(b64) {
    const bin = atob(b64);
    const buf = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
    return buf.buffer;
  }

  const lockScreen = document.getElementById('lock-screen');
  const appContent = document.getElementById('app-content');
  const transition = document.getElementById('page-transition');
  const lockInput  = document.getElementById('lock-input');
  const lockBtn    = document.getElementById('lock-btn');
  const lockError  = document.getElementById('lock-error');
  function showError() {
    const sd  = document.getElementById('lock-shape-display');
    const inp = document.getElementById('lock-input');
    if (sd) sd.classList.add('error');
    if (inp) {
      inp.value = '';
      setTimeout(() => { if (sd) sd.classList.remove('error'); }, 500);
      inp.focus();
    }
    shapeAssignments = [];
    if (typeof renderOverlay === 'function') renderOverlay();
    lockError.classList.add('show');
  }

  async function unlock() {
    const password = lockInput.value;
    if (!password) { showError(); return; }

    lockBtn.textContent = 'Mendekripsi…';
    lockBtn.disabled    = true;

    try {
      const payload = document.getElementById('enc-payload');
      const saltBuf = b64ToBuf(payload.dataset.salt);
      const ivBuf   = b64ToBuf(payload.dataset.iv);
      const ctBuf   = b64ToBuf(payload.dataset.ct);

      const key = await deriveKey(password, saltBuf);

      let decrypted;
      try {
        const plainBuf = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: ivBuf }, key, ctBuf);
        decrypted = new TextDecoder().decode(plainBuf);
      } catch(e) {
        lockBtn.textContent = 'Buka Dokumen →';
        lockBtn.disabled    = false;
        showError();
        return;
      }

      // Inject decrypted HTML
      appContent.innerHTML = decrypted;

      // Animate unlock
      lockScreen.classList.add('unlocking');
      setTimeout(() => { transition.classList.add('flash-in'); }, 400);
      setTimeout(() => {
        lockScreen.style.display = 'none';
        appContent.style.display = 'block';
        void appContent.offsetWidth;
        appContent.classList.add('visible');

        // Init main page JS setelah konten diinjeksikan
        initMainPage();

        // Restart cover animations
        ['.cover-logo','.cover-tag','.cover h1','.cover-sub','.cover-chips'].forEach(sel => {
          const el = document.querySelector(sel);
          if (!el) return;
          el.style.animation = 'none';
          void el.offsetWidth;
          el.style.animation = '';
        });

        transition.classList.remove('flash-in');
        transition.classList.add('flash-out');
        setTimeout(() => { transition.style.display = 'none'; }, 700);
      }, 700);

    } catch(err) {
      lockBtn.textContent = 'Buka Dokumen →';
      lockBtn.disabled    = false;
      showError();
    }
  }

  lockBtn.addEventListener('click', unlock);
  // Keydown on shape display handled in shape JS above
  // Focus handled by shape display on load
})();
</script>
</body>
</html>
